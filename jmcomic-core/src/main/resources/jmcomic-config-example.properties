# ===================================================
# JmComic 配置示例
# 复制此文件并修改为你需要的配置
# ===================================================

# 客户端类型: API / HTML
client.type = API

# API 域名列表（逗号分隔）
api.domains = jmcomic.me,jmcomic1.me

# HTML 域名列表（逗号分隔）
# html.domains = www.jmcomic1.art

# 代理设置
# proxy.host = 127.0.0.1
# proxy.port = 7890

# 自定义请求头（可多个）
# header.User-Agent = Mozilla/5.0 (Windows NT 10.0; Win64; x64)
# header.Referer = https://www.jmcomic1.art/

# 请求超时（秒）
timeout.seconds = 30

# 重试次数
retry.times = 5

# 下载线程池大小 (-1 表示使用 CPU 核心数)
download.thread.pool.size = -1

# 缓存大小（字节），默认 100MB
cache.size = 104857600

# 域名探活间隔（毫秒），默认 10 分钟
domain.probe.interval.ms = 600000

# 初始探活单域名超时（毫秒），默认 3 秒
domain.probe.timeout.ms = 3000

# 图片下载超时（秒）
image.timeout.seconds = 60

# 关闭时等待任务完成超时（毫秒）
close.timeout.ms = 60000
